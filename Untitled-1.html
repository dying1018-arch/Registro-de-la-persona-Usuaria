<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de la persona usuaria</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="contenedor">
        <h1>Registro de la persona usuaria</h1>
        
        <form action="#" method="post">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre"><br><br>

            <label for="apellido">Apellido:</label>
            <input type="text" id="apellido" name="apellido"><br><br>

            <label for="correo">Correo electrónico:</label>
            <input type="email" id="correo" name="correo"><br><br>

            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password"><br><br>

            <label for="descripcion">Descripción breve:</label><br>
            <textarea id="descripcion" name="descripcion" rows="4" cols="40"></textarea><br><br>

            <p>Intereses:</p>
            <input type="checkbox" id="tecnologia" name="intereses" value="Tecnología">
            <label for="tecnologia">Tecnología</label><br>
            <input type="checkbox" id="arte" name="intereses" value="Arte">
            <label for="arte">Arte</label><br>
            <input type="checkbox" id="deporte" name="intereses" value="Deporte">
            <label for="deporte">Deporte</label><br><br>

            <input type="submit" value="Registrarse">
        </form>
    </div>
</body>
</html>
